<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Family Memories - Dashboard</title>

<link rel="stylesheet" href="css/style.css">

<style>

body{

margin:0;

padding:0;

font-family:Arial,sans-serif;

background:#eef3f8;

}

header{

background:#111827;

color:#fff;

padding:20px;

font-size:28px;

font-weight:bold;

text-align:center;

}

.container{

max-width:1200px;

margin:30px auto;

padding:20px;

}

.card{

background:#fff;

padding:20px;

border-radius:15px;

box-shadow:0 8px 20px rgba(0,0,0,.12);

margin-bottom:20px;

}

button{

width:100%;

padding:15px;

margin-top:12px;

border:none;

border-radius:10px;

font-size:16px;

font-weight:bold;

cursor:pointer;

}

.wallpaper{

background:#8b5cf6;

color:#fff;

}

.album{

background:#2563eb;

color:#fff;

}

.logout{

background:#ef4444;

color:#fff;

}

#albumList{

display:grid;

grid-template-columns:repeat(auto-fill,minmax(260px,1fr));

gap:20px;

margin-top:20px;

}

</style>

</head>

<body>

<header>

My Family Memories

</header>

<div class="container">

<div class="card">

<h2>Welcome Admin 👋</h2>

<p>Manage your family memories safely.</p>

<input

type="file"

id="wallpaperInput"

accept="image/*"

style="display:none;">

<button

class="wallpaper"

onclick="document.getElementById('wallpaperInput').click()">

🖼 Change Wallpaper

</button>

<button class="album">

📁 Create Album

</button>

<button

class="logout"

onclick="location.href='login.html'">

Logout

</button>

</div>

<div id="albumList"></div>

</div>

<script type="module" src="app.js"></script>

<script>

const wallpaperInput = document.getElementById("wallpaperInput");

wallpaperInput.addEventListener("change", function(e){

const file = e.target.files[0];

if(!file) return;

const reader = new FileReader();

reader.onload = function(event){

document.body.style.backgroundImage =

"url('" + event.target.result + "')";

document.body.style.backgroundSize = "cover";

document.body.style.backgroundPosition = "center";

localStorage.setItem(

"wallpaper",

event.target.result

);

alert("Wallpaper changed successfully!");

};

reader.readAsDataURL(file);

});

const savedWallpaper = localStorage.getItem("wallpaper");

if(savedWallpaper){

document.body.style.backgroundImage =

"url('" + savedWallpaper + "')";

document.body.style.backgroundSize = "cover";

document.body.style.backgroundPosition = "center";

}

</script>

</body>

</html>
