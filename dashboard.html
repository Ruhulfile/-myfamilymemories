<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Family Memories - Dashboard</title>

<link rel="stylesheet" href="css/style.css">

<style>

</style>

</head>

<body>

<header>

My Family Memories

</header>

<div class="container">

<div class="card">

<h2>Welcome Admin 👋</h2>

<p>

Manage your family memories safely.

</p>

<input
type="file"
id="wallpaperInput"
accept="image/*"
style="display:none;"
>

<button
class="wallpaper"
onclick="document.getElementById('wallpaperInput').click()">

🖼 Change Wallpaper

</button>

<button class="album">

📁 Create Album

</button>

<button class="upload">

📸 Upload Photos

</button>

<button class="admin">

👑 Admin Panel

</button>

<button class="logout" onclick="location.href='login.html'">

Logout

</button>

</div>

<div id="albumList"></div>

</div>

<script type="module" src="app.js"></script>

<script type="module" src="album.js"></script>

<script>

const wallpaperInput = document.getElementById("wallpaperInput");

wallpaperInput.addEventListener("change", function(e){

const file = e.target.files[0];

if(!file) return;

const reader = new FileReader();

reader.onload = function(event){

alert("Wallpaper loaded successfully!");
  
document.body.style.backgroundImage =
"url('" + event.target.result + "')";

document.body.style.backgroundSize = "cover";
document.body.style.backgroundPosition = "center";

localStorage.setItem(
"wallpaper",
event.target.result
);

};

reader.readAsDataURL(file);

});

const savedWallpaper = localStorage.getItem("wallpaper");

if(savedWallpaper){

document.body.style.backgroundImage =
"url('" + savedWallpaper + "')";

document.body.style.backgroundSize = "cover";
document.body.style.backgroundPosition = "center";

}

</script>
  
</body>

</html>
