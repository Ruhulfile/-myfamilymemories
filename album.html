<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Family Memories - Album</title>

<style>

*{

margin:0;

padding:0;

box-sizing:border-box;

font-family:Arial,sans-serif;

}

body{

background:#eef3f8;

padding:20px;

}

.card{

max-width:1200px;

margin:auto;

background:#fff;

padding:20px;

border-radius:15px;

box-shadow:0 8px 20px rgba(0,0,0,.12);

}

h1{

margin-bottom:20px;

font-size:28px;

}

button{

width:100%;

padding:14px;

margin-top:12px;

border:none;

border-radius:10px;

font-size:16px;

font-weight:bold;

cursor:pointer;

}

.upload{

background:#f59e0b;

color:#fff;

}

.back{

background:#374151;

color:#fff;

}

#photos{

margin-top:20px;

display:grid;

grid-template-columns:repeat(auto-fill,minmax(170px,1fr));

gap:15px;

}

.photoBox{

background:#fff;

border-radius:12px;

overflow:hidden;

box-shadow:0 5px 15px rgba(0,0,0,.08);

}

.photoBox img{

width:100%;

height:170px;

object-fit:cover;

cursor:pointer;

display:block;

}

.deleteBtn{

background:#ef4444;

color:#fff;

width:100%;

border:none;

padding:10px;

cursor:pointer;

}

#viewer{

display:none;

position:fixed;

left:0;

top:0;

width:100%;

height:100%;

background:rgba(0,0,0,.9);

justify-content:center;

align-items:center;

z-index:9999;

}

#viewer img{

max-width:95%;

max-height:90%;

border-radius:12px;

}

#closeViewer{

position:absolute;

top:20px;

right:30px;

font-size:40px;

color:#fff;

cursor:pointer;

}

</style>

</head>

<body>

<div class="card">

<h1 id="albumTitle"></h1>

<input

type="file"

id="photoInput"

accept="image/*"

multiple

style="display:none;">

<button

class="upload"

onclick="document.getElementById('photoInput').click()">

📸 Upload Photos

</button>

<button

class="back"

onclick="location.href='dashboard.html'">

⬅ Back To Dashboard

</button>

<div id="photos"></div>

</div>

<div id="viewer">

<span id="closeViewer">&times;</span>

<img id="viewerImg">

</div>

 <script type="module">

import { db } from "./js/firebase.js";

import { uploadImage } from "./js/cloudinary.js";

import {

collection,

addDoc,

getDocs,

deleteDoc,

doc

} from "https://www.gstatic.com/firebasejs/12.3.0/firebase-firestore.js";

const album = localStorage.getItem("currentAlbum");

const albumTitle = document.getElementById("albumTitle");

const photoInput = document.getElementById("photoInput");

const photos = document.getElementById("photos");

const viewer = document.getElementById("viewer");

const viewerImg = document.getElementById("viewerImg");

const closeViewer = document.getElementById("closeViewer");

albumTitle.innerHTML = "📁 " + album;

const photoCollection = collection(db, "albums", album, "photos");

// ===============================

// Upload Photos

// ===============================

photoInput.addEventListener("change", async (e) => {

    const files = [...e.target.files];

    if (files.length === 0) return;

    for (const file of files) {

        try {

            const imageUrl = await uploadImage(file);

            await addDoc(photoCollection, {

                image: imageUrl,

                createdAt: Date.now()

            });

        } catch (err) {

            console.error(err);

            alert("Photo upload failed.");

        }

    }

    await loadPhotos();

    photoInput.value = "";

});

// ===============================

// Load Photos

// ===============================

async function loadPhotos() {

    photos.innerHTML = "";

    const snapshot = await getDocs(photoCollection);

    if (snapshot.empty) {

        photos.innerHTML = "<p>No photos found.</p>";

        return;

    }

    snapshot.forEach((photoDoc) => {

        const data = photoDoc.data();

        const box = document.createElement("div");

        box.className = "photoBox";

        const img = document.createElement("img");

        img.src = data.image;

        img.onclick = () => {

            viewer.style.display = "flex";

            viewerImg.src = data.image;

        };

  box.appendChild(img);

        const delBtn = document.createElement("button");

        delBtn.className = "deleteBtn";

        delBtn.innerHTML = "🗑 Delete";

        delBtn.onclick = async () => {

            if (!confirm("Delete this photo?")) return;

            await deleteDoc(

                doc(db, "albums", album, "photos", photoDoc.id)

            );

            await loadPhotos();

        };

        box.appendChild(delBtn);

        photos.appendChild(box);

    });

}

// ===============================

// First Load

// ===============================

await loadPhotos();

// ===============================

// Viewer Close

// ===============================

closeViewer.onclick = () => {

    viewer.style.display = "none";

};

viewer.onclick = (e) => {

    if (e.target === viewer) {

        viewer.style.display = "none";

    }

};

</script>

</body>

</html>
