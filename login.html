<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - My Family Memories</title>

<style>

*{

margin:0;

padding:0;

box-sizing:border-box;

font-family:Arial,sans-serif;

}

body{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:linear-gradient(135deg,#0f172a,#1e293b,#334155);

}

.login-box{

width:90%;

max-width:400px;

background:white;

padding:30px;

border-radius:18px;

box-shadow:0 10px 30px rgba(0,0,0,.3);

}

h2{

text-align:center;

margin-bottom:25px;

}

input{

width:100%;

padding:14px;

margin-bottom:15px;

border:1px solid #ccc;

border-radius:10px;

font-size:16px;

}

button{

width:100%;

padding:15px;

background:#2563eb;

color:white;

border:none;

border-radius:10px;

font-size:17px;

cursor:pointer;

}

button:hover{

background:#1d4ed8;

}

.note{

margin-top:20px;

font-size:14px;

text-align:center;

color:#666;

}

</style>

</head>

<body>

<div class="login-box">

<h2>Family Login</h2>
  
<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">

<button id="loginBtn">

Login

</button>

<div class="note">

My Family Memories

</div>

</div>

<script type="module" src="firebase.js"></script>
<script type="module" src="login.js"></script>

</body>

</html>
